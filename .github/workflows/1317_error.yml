name: Reproduce setup-python #1317

on:
  push:
    branches:
      - main
  workflow_dispatch:

# permissions:
#   contents: read

jobs:
  reproduce:
    runs-on: macos-26
    name: "Checking error"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installing Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"