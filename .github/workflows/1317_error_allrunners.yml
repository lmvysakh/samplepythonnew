name: Reproduce setup-python - 1317 - all runners

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ${{ matrix.os }}
    name: "Reproduce error - ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest
          - macos-15-intel
          - windows-11-arm
          - ubuntu-24-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installing Python 3.10
        uses: actions/setup-python@v6
        # uses: lmvysakh/setup-python@1317_fix_annotation
        with:
          python-version: "3.10"
          pip-version: "25.0.1"