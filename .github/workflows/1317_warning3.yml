name: Test Warning - Outdated pip in container

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-warning:
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
      - name: Setup Python
        id: setup
        # uses: lmvysakh/setup-python@1317_fix_annotation
        # uses: lmvysakh/setup-python@1317_alternate_fix
        uses:  actions/setup-python@v6 
        # uses: lmvysakh/setup-python@1317_alternate_again
        with:
          python-version: '3.9'
        continue-on-error: true

 