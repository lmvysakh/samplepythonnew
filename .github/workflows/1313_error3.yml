name: Test Error Scenario 2 - Disk full

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-error:
    runs-on: ubuntu-latest
    steps:
      - name: Remove cached Python and fill up disk
        run: |
          sudo rm -rf /opt/hostedtoolcache/Python/3.12.*
          # Create a small tmpfs mount over the tool cache to simulate disk full
          sudo mount -t tmpfs -o size=1M tmpfs /opt/hostedtoolcache

      - name: Setup Python
        id: setup
        # uses: lmvysakh/setup-python@1317_fix_annotation
        # uses: lmvysakh/setup-python@1317_alternate_fix
        # uses:  actions/setup-python@v6 
        uses: lmvysakh/setup-python@1317_alternate_again
        with:
          python-version: '3.12'
        continue-on-error: true

      - name: Restore mount
        if: always()
        run: sudo umount /opt/hostedtoolcache || true

      - name: Verify outcome
        run: |
          echo "Setup python outcome: ${{ steps.setup.outcome }}"
          if [ "${{ steps.setup.outcome }}" == "failure" ]; then
            echo "SUCCESS: setup-python failed — stderr should appear as RED error annotation"
          else
            echo "UNEXPECTED: setup-python did not fail as expected"
          fi