name: Test Error Scenario 2

on:
  workflow_dispatch:

jobs:
  test-error:
    runs-on: ubuntu-latest
    steps:
      - name: Remove cached Python and make temp directory read-only
        run: |
          # Remove cached Python so setup-python is forced to re-install
          sudo rm -rf /opt/hostedtoolcache/Python/3.12.*
          # Make the temp directory read-only so extractTar output can't be modified
          # but setup.sh will fail because bash can't write to the expected paths
          sudo chmod 000 /opt/hostedtoolcache

      - name: Setup Python
        id: setup
         # uses: lmvysakh/setup-python@1317_fix_annotation
        # uses: lmvysakh/setup-python@1317_alternate_fix
        uses:  actions/setup-python@v6 
        # uses: lmvysakh/setup-python@1317_alternate_again
        with:
          python-version: '3.12'
        continue-on-error: true

      - name: Restore permissions
        run: sudo chmod 755 /opt/hostedtoolcache

      - name: Verify outcome
        run: |
          echo "Setup python outcome: ${{ steps.setup.outcome }}"
          if [ "${{ steps.setup.outcome }}" == "failure" ]; then
            echo "SUCCESS: setup-python failed — stderr should appear as RED error annotation"
          else
            echo "UNEXPECTED: setup-python did not fail as expected"
          fi