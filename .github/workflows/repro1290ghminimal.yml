name: "Github-hosted - Directory Junction - Minimal"

on:
  workflow_dispatch:
  push:
    branches: [main]

verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-2025, windows-2022, windows-2025-vs2026, windows-11-arm]

    steps:
      - name: Create junction to bypass spaces in tool cache path
        shell: powershell
        run: |
          if not exist "C:\Program Files\HostedTools" mkdir "C:\Program Files\HostedTools"
          if exist C:\ToolCache (rmdir C:\ToolCache)
          mklink /J C:\ToolCache "C:\Program Files\HostedTools"
          echo AGENT_TOOLSDIRECTORY=C:\ToolCache>> "%GITHUB_ENV%"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Verify
        shell: powershell
        run: |
          python --version
          python -m pip --version