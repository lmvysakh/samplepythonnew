name: Test Warning Scenario 2 - Pip version warning with older Python

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-warning:
    runs-on: macos-latest
    steps:
      - name: Setup Python 3.9 (older version likely to produce pip warnings)
        id: setup
         # uses: lmvysakh/setup-python@1317_fix_annotation
        uses: lmvysakh/setup-python@1317_alternate_fix
        # uses:  actions/setup-python@v6 
        # uses: lmvysakh/setup-python@1317_alternate_again
        with:
          python-version: '3.7'
        continue-on-error: true

      - name: Verify outcome
        run: |
          echo "Setup python outcome: ${{ steps.setup.outcome }}"
          if [ "${{ steps.setup.outcome }}" == "success" ]; then
            echo "SUCCESS: Check annotations — any WARNING should be YELLOW, not RED"
          else
            echo "UNEXPECTED: setup-python failed"
          fi