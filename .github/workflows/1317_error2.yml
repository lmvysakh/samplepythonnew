name: Test Error Scenario - Stderr Error Path

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-stderr-error:
    name: Test stderr error path (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Make tool cache read-only to force setup.sh failure
        run: |
          sudo chmod 000 /opt/hostedtoolcache
        shell: bash

      - name: Setup Python (should fail in setup.sh with stderr)
        id: setup-python
        uses: lmvysakh/setup-python@1317_fix_annotation
        # uses:  actions/setup-python@v6

        continue-on-error: true
        with:
          python-version: '3.12.3'

      - name: Restore permissions
        if: always()
        run: sudo chmod 755 /opt/hostedtoolcache
        shell: bash

      - name: Verify failure
        run: |
          echo "Setup python outcome: ${{ steps.setup-python.outcome }}"
          if [ "${{ steps.setup-python.outcome }}" == "failure" ]; then
            echo "SUCCESS: setup-python failed — stderr lines should appear as RED error annotations"
          else
            echo "INFO: setup-python did not fail as expected"
          fi
        shell: bash  