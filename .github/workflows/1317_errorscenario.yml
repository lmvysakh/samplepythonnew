name: Test Error Scenario - Invalid Version

on:
  workflow_dispatch:

jobs:
  test-invalid-version:
    name: Test invalid version (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Setup Python with non-existent version (expect failure)
        id: setup-python
        uses: actions/setup-python@v6
        # uses: lmvysakh/setup-python@1317_fix_annotation
        continue-on-error: true
        with:
          python-version: '3.9.999'