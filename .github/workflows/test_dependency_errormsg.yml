name: Test setup-python improved error message

on:
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  test-pip:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python with pip cache
        id: setup-python
        uses: aroudaki70/setup-python@error-message-update
        # uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'nonexistent/requirements.txt'
        continue-on-error: true
  

  test-pipenv:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python with pipenv cache
        id: setup-python
        uses: aroudaki70/setup-python@error-message-update
        # uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pipenv'
          cache-dependency-path: 'nonexistent/Pipfile.lock'
        continue-on-error: true
      

  test-poetry:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python with poetry cache
        id: setup-python
        uses: aroudaki70/setup-python@error-message-update
        # uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'poetry'
          cache-dependency-path: 'nonexistent/poetry.lock'
        continue-on-error: true
     


  